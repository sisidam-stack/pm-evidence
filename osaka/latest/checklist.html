<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>テコラ シロアリ防除 申込前チェックリスト</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:"Noto Sans JP",sans-serif;font-size:14px;line-height:1.7;color:#1f2937;background:#f9fafb;padding:20px;max-width:720px;margin:0 auto}.header{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;padding:20px 24px;border-radius:10px;margin-bottom:20px}.header h1{font-size:1.25rem;font-weight:bold;margin-bottom:4px}.section-title{font-size:.8rem;font-weight:bold;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px;padding-bottom:4px;border-bottom:1px solid #e5e7eb}.check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:6px;cursor:pointer}.check-box{width:18px;height:18px;cursor:pointer;flex-shrink:0;margin-top:2px;accent-color:#3b82f6}label{display:flex;flex-wrap:wrap;gap:4px 8px;cursor:pointer;flex:1}.check-num{background:#dbeafe;color:#1d4ed8;font-size:.75rem;font-weight:bold;border-radius:3px;padding:0 5px}.check-cat{font-size:.8rem;color:#6b7280}.check-text{font-size:.88rem;color:#1f2937}input:checked+label .check-text{text-decoration:line-through;color:#9ca3af}.footer{text-align:center;font-size:.75rem;color:#9ca3af;margin-top:20px;padding-top:12px;border-top:1px solid #e5e7eb}.print-btn{display:block;width:100%;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-top:16px}.print-btn:hover{background:#2563eb}@media print{body{background:#fff;padding:0}.header{background:#1d4ed8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.check-box{-webkit-print-color-adjust:exact}.print-btn{display:none}.check-item{break-inside:avoid}}</style></head>
<body><div class="header"><h1>📋 テコラ シロアリ防除</h1><div class="meta">申込前チェックリスト｜2026年06月27日 作成</div></div>
<div class="section-title">確認事項（全16項目）</div><div class="check-item"><input type="checkbox" id="chk1" class="check-box"><label for="chk1"><span class="check-num">01</span><span class="check-cat">建物対象確認</span><span class="check-text">2001年以降に建築された戸建て住宅であることを確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk2" class="check-box"><label for="chk2"><span class="check-num">02</span><span class="check-cat">大阪・関西エリア確認</span><span class="check-text">対応エリア（大阪・関西）に居住していることを確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk3" class="check-box"><label for="chk3"><span class="check-num">03</span><span class="check-cat">シロアリ被害の有無</span><span class="check-text">現在シロアリによる被害や侵入の痕跡がないか確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk4" class="check-box"><label for="chk4"><span class="check-num">04</span><span class="check-cat">予防・駆除の区別</span><span class="check-text">テコラはシロアリ「予防専門」であり駆除には非対応であることを確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk5" class="check-box"><label for="chk5"><span class="check-num">05</span><span class="check-cat">床下点検口の有無</span><span class="check-text">床下への点検口があるか確認した（施工に必要）</span></label></div><div class="check-item"><input type="checkbox" id="chk6" class="check-box"><label for="chk6"><span class="check-num">06</span><span class="check-cat">定期防除の周期</span><span class="check-text">5年ごとの定期防除契約の仕組みを理解した</span></label></div><div class="check-item"><input type="checkbox" id="chk7" class="check-box"><label for="chk7"><span class="check-num">07</span><span class="check-cat">10年定期保証の条件</span><span class="check-text">10年定期保証の適用条件・範囲を書面で確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk8" class="check-box"><label for="chk8"><span class="check-num">08</span><span class="check-cat">薬剤の種類・安全性</span><span class="check-text">使用する防除薬剤の種類・安全基準・人体への影響を確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk9" class="check-box"><label for="chk9"><span class="check-num">09</span><span class="check-cat">工事担当者の資格</span><span class="check-text">作業担当者がシロアリ防除施工士等の資格を持つか確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk10" class="check-box"><label for="chk10"><span class="check-num">10</span><span class="check-cat">施工料金の内訳</span><span class="check-text">施工料金の内訳（床面積あたり単価・追加費用等）を書面で確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk11" class="check-box"><label for="chk11"><span class="check-num">11</span><span class="check-cat">他社との見積り比較</span><span class="check-text">最低2〜3社から見積りを取得して比較した</span></label></div><div class="check-item"><input type="checkbox" id="chk12" class="check-box"><label for="chk12"><span class="check-num">12</span><span class="check-cat">アフターサポート</span><span class="check-text">施工後のアフターサポート連絡先・対応体制を確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk13" class="check-box"><label for="chk13"><span class="check-num">13</span><span class="check-cat">契約内容の確認</span><span class="check-text">契約書に署名する前に全ての条項を確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk14" class="check-box"><label for="chk14"><span class="check-num">14</span><span class="check-cat">クーリングオフ</span><span class="check-text">クーリングオフ期間（訪問販売の場合8日間）と手続き方法を確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk15" class="check-box"><label for="chk15"><span class="check-num">15</span><span class="check-cat">補助金・助成金</span><span class="check-text">市区町村によるシロアリ対策への補助金・助成金の有無を確認した</span></label></div><div class="check-item"><input type="checkbox" id="chk16" class="check-box"><label for="chk16"><span class="check-num">16</span><span class="check-cat">施工当日の準備</span><span class="check-text">施工当日の室内退避・家具移動等の事前準備を確認した</span></label></div><button class="print-btn" onclick="window.print()">🖨️ 印刷 / PDFで保存</button><div class="footer">このチェックリストはテコラ（シロアリ防除）の申込前確認用です。2026年06月27日 時点。</div></body></html>
