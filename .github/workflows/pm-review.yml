name: PM Review Runner v2.0

on:
  workflow_dispatch:
    inputs:
      site_key:
        description: 'サイトキー (consul / tokyo / osaka / uwaki / recoverywear)'
        required: true
        default: 'consul'
      public_url:
        description: '公開URL'
        required: true
        default: 'https://www.consul-tenshoku.com'
      bundle_id:
        description: 'Bundle ID'
        required: true
        default: 'consul-E1-20260628-v6-READY'
      review_id:
        description: 'Review ID'
        required: true
        default: 'CSL-E1-20260628-V6'
      expected_live_html_hash:
        description: 'Evidence Bundle の live_html_hash（整合性確認用）'
        required: true
        default: 'cc392ff824eb9ef1f1ad45c152b67851'

jobs:
  pm-review:
    name: PM Independent Review
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run PM Review Runner
        env:
          SITE_KEY: ${{ inputs.site_key }}
          PUBLIC_URL: ${{ inputs.public_url }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
          REVIEW_ID: ${{ inputs.review_id }}
          EXPECTED_LIVE_HTML_HASH: ${{ inputs.expected_live_html_hash }}
          OUTPUT_DIR: ${{ github.workspace }}/pm-review-output
        run: node scripts/pm_review_runner.js

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pm-review-${{ inputs.review_id }}-${{ github.run_id }}
          path: pm-review-output/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## PM Review Runner v2.0" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Review ID | ${{ inputs.review_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle ID | ${{ inputs.bundle_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Public URL | ${{ inputs.public_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Expected Hash | ${{ inputs.expected_live_html_hash }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f pm-review-output/pm-review-runner-result.json ]; then
            STATUS=$(jq -r '.overall_status' pm-review-output/pm-review-runner-result.json)
            ACTUAL_HASH=$(jq -r '.actual_live_html_hash' pm-review-output/pm-review-runner-result.json)
            BLOCKING=$(jq -r '.blocking_reasons | length' pm-review-output/pm-review-runner-result.json)
            echo "| Overall | **${STATUS}** |" >> $GITHUB_STEP_SUMMARY
            echo "| Actual Hash | ${ACTUAL_HASH} |" >> $GITHUB_STEP_SUMMARY
            echo "| Blocking Issues | ${BLOCKING} |" >> $GITHUB_STEP_SUMMARY
          fi
