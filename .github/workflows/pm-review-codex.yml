name: PM Review Codex Agent v2.0

# Evidence Framework v2.0 正式PMレビューワークフロー
# openai/codex-action@v1 を使用した PM 独立取得・検証

on:
  workflow_dispatch:
    inputs:
      site_key:
        description: 'サイトキー (consul / tokyo / osaka / uwaki / recoverywear)'
        required: true
        default: 'consul'
      public_url:
        description: '公開URL'
        required: true
        default: 'https://www.consul-tenshoku.com'
      bundle_id:
        description: 'Bundle ID'
        required: true
        default: 'consul-E1-20260628-v6-READY'
      review_id:
        description: 'Review ID'
        required: true
        default: 'CSL-E1-20260628-V6'
      expected_live_html_hash:
        description: 'Evidence Bundle の live_html_hash'
        required: true
        default: 'cc392ff824eb9ef1f1ad45c152b67851'

  push:
    paths:
      - '*/archive/**/verification.json'
      - 'consul/archive/**/verification.json'
      - 'tokyo/archive/**/verification.json'
      - 'osaka/archive/**/verification.json'
      - 'uwaki/archive/**/verification.json'
      - 'recoverywear/archive/**/verification.json'

jobs:
  # ── READY 検知ジョブ（push トリガー時）────────────────────────────────
  detect-ready:
    name: Detect READY Bundle
    runs-on: [self-hosted, pm-review, macos]
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      site_key: ${{ steps.check.outputs.site_key }}
      public_url: ${{ steps.check.outputs.public_url }}
      bundle_id: ${{ steps.check.outputs.bundle_id }}
      review_id: ${{ steps.check.outputs.review_id }}
      live_html_hash: ${{ steps.check.outputs.live_html_hash }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect READY or use dispatch inputs
        id: check
        run: |
          # workflow_dispatch の場合は入力値をそのまま使用
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true"                                          >> $GITHUB_OUTPUT
            echo "site_key=${{ inputs.site_key }}"                         >> $GITHUB_OUTPUT
            echo "public_url=${{ inputs.public_url }}"                     >> $GITHUB_OUTPUT
            echo "bundle_id=${{ inputs.bundle_id }}"                       >> $GITHUB_OUTPUT
            echo "review_id=${{ inputs.review_id }}"                       >> $GITHUB_OUTPUT
            echo "live_html_hash=${{ inputs.expected_live_html_hash }}"    >> $GITHUB_OUTPUT
            echo "Triggered by workflow_dispatch"
            exit 0
          fi

          # push トリガーの場合は変更ファイルから READY を検知
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep 'verification\.json' | grep 'archive/' | head -1)
          echo "Changed: ${CHANGED}"
          if [ -z "${CHANGED}" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT; exit 0
          fi

          STATUS=$(jq -r '.pm_review_status // empty' "${CHANGED}" 2>/dev/null)
          echo "pm_review_status: ${STATUS}"
          if [ "${STATUS}" != "READY" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT; exit 0
          fi

          BUNDLE_ID=$(jq -r '.bundle_id // .evidence_bundle_id' "${CHANGED}")
          PUBLIC_URL=$(jq -r '.public_url' "${CHANGED}")
          LIVE_HASH=$(jq -r '.live_html_hash' "${CHANGED}")
          SITE_KEY=$(jq -r '.site_key // empty' "${CHANGED}")
          [ -z "${SITE_KEY}" ] && SITE_KEY=$(echo "${CHANGED}" | cut -d'/' -f1)

          METADATA="${CHANGED%verification.json}metadata.json"
          REVIEW_ID=$([ -f "${METADATA}" ] && jq -r '.review_id // empty' "${METADATA}" || echo "${BUNDLE_ID}")

          echo "should_run=true"             >> $GITHUB_OUTPUT
          echo "site_key=${SITE_KEY}"        >> $GITHUB_OUTPUT
          echo "public_url=${PUBLIC_URL}"    >> $GITHUB_OUTPUT
          echo "bundle_id=${BUNDLE_ID}"      >> $GITHUB_OUTPUT
          echo "review_id=${REVIEW_ID}"      >> $GITHUB_OUTPUT
          echo "live_html_hash=${LIVE_HASH}" >> $GITHUB_OUTPUT

          echo "=== Auto-detected ==="
          echo "site_key=${SITE_KEY} bundle_id=${BUNDLE_ID} review_id=${REVIEW_ID}"

  # ── Self-hosted PM Review Agent（正本）──────────────────────────────────
  # PM の Mac からアクセスするため CoreServer WAF を回避できる。
  # セルフホストランナーが未登録の場合はスキップされる。
  pm-review-self-hosted:
    name: PM Review (Self-Hosted / 正本)
    needs: detect-ready
    if: needs.detect-ready.outputs.should_run == 'true'
    runs-on: [self-hosted, pm-review, macos]
    timeout-minutes: 20
    continue-on-error: true

    env:
      SITE_KEY: ${{ needs.detect-ready.outputs.site_key }}
      PUBLIC_URL: ${{ needs.detect-ready.outputs.public_url }}
      BUNDLE_ID: ${{ needs.detect-ready.outputs.bundle_id }}
      REVIEW_ID: ${{ needs.detect-ready.outputs.review_id }}
      EXPECTED_LIVE_HTML_HASH: ${{ needs.detect-ready.outputs.live_html_hash }}
      OUTPUT_DIR: ${{ github.workspace }}/pm-review-output
      USE_PLAYWRIGHT_HTML: 'true'
      USE_PLAYWRIGHT_SS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run PM Review Runner (Self-Hosted)
        run: node scripts/pm_review_runner.js

      - name: Verify result
        run: |
          if [ -f pm-review-output/pm-review-runner-result.json ]; then
            STATUS=$(jq -r '.overall_status' pm-review-output/pm-review-runner-result.json)
            CF=$(jq -r '.cloudflare_blocked // false' pm-review-output/pm-review-runner-result.json)
            echo "overall_status: ${STATUS}"
            echo "cloudflare_blocked: ${CF}"
            if [ "${CF}" = "true" ]; then
              echo "::error::CLOUDFLARE_BLOCKED: セルフホストランナーでも WAF にブロックされました"
              exit 1
            fi
          fi

      - name: Upload Artifacts (Self-Hosted)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pm-review-self-hosted-${{ needs.detect-ready.outputs.review_id }}-${{ github.run_id }}
          path: pm-review-output/
          retention-days: 30

      - name: Summary (Self-Hosted)
        if: always()
        run: |
          echo "## PM Review Agent（Self-Hosted 正本）" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | self-hosted / pm-review / macos |" >> $GITHUB_STEP_SUMMARY
          echo "| Review ID | ${{ needs.detect-ready.outputs.review_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Public URL | ${{ needs.detect-ready.outputs.public_url }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f pm-review-output/pm-review-runner-result.json ]; then
            STATUS=$(jq -r '.overall_status' pm-review-output/pm-review-runner-result.json)
            CF=$(jq -r '.cloudflare_blocked // false' pm-review-output/pm-review-runner-result.json)
            BLOCKING=$(jq -r '.blocking_reasons | length' pm-review-output/pm-review-runner-result.json)
            echo "| **Overall** | **${STATUS}** |" >> $GITHUB_STEP_SUMMARY
            echo "| CloudFlare Blocked | ${CF} |" >> $GITHUB_STEP_SUMMARY
            echo "| Blocking Issues | ${BLOCKING} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APPROVED / REJECT は ChatGPT PM のみが Artifacts を確認して判定します。**" >> $GITHUB_STEP_SUMMARY

  # ── Codex PM Review Agent（Self-Hosted Runner / Evidence Framework v2.0）──
  # PM側 self-hosted runner のみで実行。GitHub Hosted Runner は廃止。
  pm-review-codex:
    name: Codex PM Review Agent
    needs: detect-ready
    if: needs.detect-ready.outputs.should_run == 'true'
    runs-on: [self-hosted, pm-review, macos]
    timeout-minutes: 20

    permissions:
      contents: write

    env:
      SITE_KEY: ${{ needs.detect-ready.outputs.site_key }}
      PUBLIC_URL: ${{ needs.detect-ready.outputs.public_url }}
      BUNDLE_ID: ${{ needs.detect-ready.outputs.bundle_id }}
      REVIEW_ID: ${{ needs.detect-ready.outputs.review_id }}
      EXPECTED_LIVE_HTML_HASH: ${{ needs.detect-ready.outputs.live_html_hash }}
      OUTPUT_DIR: ${{ github.workspace }}/pm-review-output

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Step A: Playwright スクリーンショット（runner ユーザーで実行）──
      # Codex Action はカーネルサンドボックス制限で Chrome を起動できないため、
      # スクリーンショットは通常の runner ステップで取得する。
      - name: Playwright Screenshots (PC/SP)
        env:
          SITE_KEY: ${{ needs.detect-ready.outputs.site_key }}
          PUBLIC_URL: ${{ needs.detect-ready.outputs.public_url }}
          BUNDLE_ID: ${{ needs.detect-ready.outputs.bundle_id }}
          REVIEW_ID: ${{ needs.detect-ready.outputs.review_id }}
          EXPECTED_LIVE_HTML_HASH: ${{ needs.detect-ready.outputs.live_html_hash }}
          OUTPUT_DIR: ${{ github.workspace }}/pm-review-output
          USE_PLAYWRIGHT_HTML: 'true'
          USE_PLAYWRIGHT_SS: 'true'
        run: node scripts/pm_review_runner.js

      # ── Step B: Codex PM Review Agent（既取得HTMLのオフライン解析）────
      # Step A で取得済みの pm-public.html を読み込み、ネットワーク不要でDOM解析する。
      # Codex サンドボックスはDNSアクセス不可のため、外部通信は行わない。
      - name: Codex PM Review Agent (Offline DOM Analysis)
        uses: openai/codex-action@v1
        with:
          prompt: |
            あなたは PM Review Agent です。Step A（Playwright）が既に公開HTMLを取得して
            `pm-review-output/pm-public.html` に保存しています。
            このファイルを読み込んでオフラインでDOM解析し、
            `pm-review-output/pm-codex-analysis.json` に結果を書き込んでください。

            ## 解析対象ファイル
            - `pm-review-output/pm-public.html` （Step A が取得した公開HTML）
            - `pm-review-output/pm-review-runner-result.json` （Step A のRunnerが生成した結果）

            ## 解析手順（ネットワーク不要）

            以下を実行して `pm-review-output/pm-public.html` を解析してください:

            ```javascript
            const fs = require('fs');
            const html = fs.readFileSync('pm-review-output/pm-public.html', 'utf-8');
            const result = JSON.parse(fs.readFileSync('pm-review-output/pm-review-runner-result.json', 'utf-8'));

            const analysis = {
              agent: 'Codex PM Review Agent v2.0',
              analyzed_at: new Date().toISOString(),
              review_id: '${{ needs.detect-ready.outputs.review_id }}',
              bundle_id: '${{ needs.detect-ready.outputs.bundle_id }}',
              runner_result: result,
              codex_checks: {
                wakaru_count: (html.match(/この記事でわかること/g) || []).length,
                lead_count: (html.match(/気になっている方も多い/g) || []).length,
                dup_judge: (html.match(/判断することが重要/g) || []).length,
                table_fixed: /table-layout\s*:\s*fixed/.test(html),
                template_leak: ['製品保証','工事保証','定期点検','施工'].filter(w => html.includes(w)),
                html_size: html.length,
                is_challenge_page: html.includes('One moment') || html.length < 20000,
              }
            };

            // 全チェックがPASSかどうか
            const c = analysis.codex_checks;
            const allPass = c.wakaru_count === 1 && c.lead_count === 1 &&
                            c.dup_judge === 0 && c.table_fixed &&
                            c.template_leak.length === 0 && !c.is_challenge_page;
            analysis.codex_overall = allPass ? 'PASS' : 'FAIL';

            fs.writeFileSync('pm-review-output/pm-codex-analysis.json',
              JSON.stringify(analysis, null, 2));
            console.log('Codex analysis:', JSON.stringify(analysis.codex_checks, null, 2));
            console.log('Codex overall:', analysis.codex_overall);
            ```

            実行後に `pm-review-output/pm-codex-analysis.json` の内容を表示してください。

            ## 重要な制約
            - APPROVED / REJECT の判定は絶対に行わない（ChatGPT PM のみが判定する）
            - pm-review-runner-result.json は上書き禁止（Step A の結果を保護する）
            - ネットワーク接続は行わない

            詳細な指示は `prompts/pm_review_agent.md` を参照すること。
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pm-review-codex-${{ needs.detect-ready.outputs.review_id }}-${{ github.run_id }}
          path: pm-review-output/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## PM Review Codex Agent v2.0" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Review ID | ${{ needs.detect-ready.outputs.review_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle ID | ${{ needs.detect-ready.outputs.bundle_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Public URL | ${{ needs.detect-ready.outputs.public_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Expected Hash | ${{ needs.detect-ready.outputs.live_html_hash }} |" >> $GITHUB_STEP_SUMMARY

          if [ -f pm-review-output/pm-review-runner-result.json ]; then
            STATUS=$(jq -r '.overall_status' pm-review-output/pm-review-runner-result.json)
            CF=$(jq -r '.cloudflare_blocked // false' pm-review-output/pm-review-runner-result.json)
            BLOCKING=$(jq -r '.blocking_reasons | length' pm-review-output/pm-review-runner-result.json)
            echo "| **Overall** | **${STATUS}** |" >> $GITHUB_STEP_SUMMARY
            echo "| CloudFlare Blocked | ${CF} |" >> $GITHUB_STEP_SUMMARY
            echo "| Blocking Issues | ${BLOCKING} |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PM 判定待ち。Artifacts を確認してください。**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APPROVED / REJECT は ChatGPT PM のみが判定します。" >> $GITHUB_STEP_SUMMARY
