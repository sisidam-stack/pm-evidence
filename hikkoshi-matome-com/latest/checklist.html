<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>電気の手続きサポートセンター 問い合わせ・面談チェックリスト</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Meiryo', sans-serif;
  font-size: 14px;
  line-height: 1.7;
  color: #1f2937;
  background: #f9fafb;
  padding: 20px;
  max-width: 720px;
  margin: 0 auto;
}
.header {
  background: linear-gradient(135deg, #1d4ed8, #3b82f6);
  color: #fff;
  padding: 20px 24px;
  border-radius: 10px;
  margin-bottom: 20px;
}
.header h1 { font-size: 1.25rem; font-weight: bold; margin-bottom: 4px; }
.header .meta { font-size: .8rem; opacity: .85; }
.section-title {
  font-size: .8rem;
  font-weight: bold;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin: 20px 0 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #e5e7eb;
}
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: background .15s;
}
.check-item:hover { background: #f0f9ff; }
.check-box { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; margin-top: 2px; accent-color: #3b82f6; }
label { display: flex; flex-wrap: wrap; gap: 4px 8px; cursor: pointer; flex: 1; }
.check-num {
  background: #dbeafe;
  color: #1d4ed8;
  font-size: .75rem;
  font-weight: bold;
  border-radius: 3px;
  padding: 0 5px;
  white-space: nowrap;
}
.check-cat {
  font-size: .8rem;
  color: #6b7280;
  white-space: nowrap;
}
.check-text { font-size: .88rem; color: #1f2937; }
input:checked + label .check-text { text-decoration: line-through; color: #9ca3af; }
.footer {
  text-align: center;
  font-size: .75rem;
  color: #9ca3af;
  margin-top: 20px;
  padding-top: 12px;
  border-top: 1px solid #e5e7eb;
}
.print-btn {
  display: block;
  width: 100%;
  padding: 10px;
  background: #3b82f6;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: .9rem;
  cursor: pointer;
  margin-top: 16px;
}
.print-btn:hover { background: #2563eb; }

@media print {
  body { background: #fff; padding: 0; max-width: 100%; }
  .header { background: #1d4ed8 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .check-box { -webkit-print-color-adjust: exact; }
  .print-btn { display: none; }
  .check-item { break-inside: avoid; }
}
</style>
</head>
<body>
<div class="header">
  <h1>📋 電気の手続きサポートセンター</h1>
  <div class="meta">問い合わせ・面談時チェックリスト｜2026年06月26日 作成</div>
</div>

<div class="section-title">確認事項（全12項目）</div>

        <div class="check-item">
          <input type="checkbox" id="chk1" class="check-box">
          <label for="chk1">
            <span class="check-num">01</span>
            <span class="check-cat">対応エリア確認</span>
            <span class="check-text">対応エリア（都道府県・電力会社エリア）を確認した</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk2" class="check-box">
          <label for="chk2">
            <span class="check-num">02</span>
            <span class="check-cat">引越し日確認</span>
            <span class="check-text">引越し日・転居日を確認し、手続き可能期間内か確認した</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk3" class="check-box">
          <label for="chk3">
            <span class="check-num">03</span>
            <span class="check-cat">開通希望日確認</span>
            <span class="check-text">電気・ガス・ネットの開通希望日を確認した</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk4" class="check-box">
          <label for="chk4">
            <span class="check-num">04</span>
            <span class="check-cat">現在の契約確認</span>
            <span class="check-text">現在の契約会社・プラン・料金を確認した（検針票等で確認）</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk5" class="check-box">
          <label for="chk5">
            <span class="check-num">05</span>
            <span class="check-cat">希望サービス確認</span>
            <span class="check-text">手続き対象サービス（電気・ガス・インターネット等）を確認した</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk6" class="check-box">
          <label for="chk6">
            <span class="check-num">06</span>
            <span class="check-cat">キャッシュバック条件</span>
            <span class="check-text">キャッシュバック・特典の受け取り条件・時期・手続きを確認した</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk7" class="check-box">
          <label for="chk7">
            <span class="check-num">07</span>
            <span class="check-cat">継続利用条件確認</span>
            <span class="check-text">特典に必要な継続利用期間・条件を確認した</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk8" class="check-box">
          <label for="chk8">
            <span class="check-num">08</span>
            <span class="check-cat">解約条件確認</span>
            <span class="check-text">解約・途中解約の条件・違約金・クーリングオフ期間を確認した</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk9" class="check-box">
          <label for="chk9">
            <span class="check-num">09</span>
            <span class="check-cat">必要書類確認</span>
            <span class="check-text">申込みに必要な書類・情報（検針票・身分証等）を準備した</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk10" class="check-box">
          <label for="chk10">
            <span class="check-num">10</span>
            <span class="check-cat">担当者名の確認</span>
            <span class="check-text">対応した担当者名・連絡先を控えた</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk11" class="check-box">
          <label for="chk11">
            <span class="check-num">11</span>
            <span class="check-cat">提案内容の書面確認</span>
            <span class="check-text">提案された料金・プラン・特典条件を書面またはメールで確認した</span>
          </label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chk12" class="check-box">
          <label for="chk12">
            <span class="check-num">12</span>
            <span class="check-cat">他社比較実施</span>
            <span class="check-text">類似サービスと料金・キャンペーン・対応速度を比較検討した</span>
          </label>
        </div>

<button class="print-btn" onclick="window.print()">🖨️ 印刷 / PDFで保存</button>

<div class="footer">
  このチェックリストは 電気の手続きサポートセンター の申込み前確認用です。
  情報は 2026年06月26日 時点のものです。最新情報は公式サイトでご確認ください。
</div>
</body>
</html>
