<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Groovement Agent コンサル転職エージェント選びチェックリスト</title>
<style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.7; color: #1f2937; background: #f9fafb; padding: 20px; max-width: 720px; margin: 0 auto; }
.header { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: #fff; padding: 20px 24px; border-radius: 10px; margin-bottom: 20px; }
.header h1 { font-size: 1.25rem; font-weight: bold; margin-bottom: 4px; }
.section-title { font-size: .8rem; font-weight: bold; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; margin: 20px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #e5e7eb; }
.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; margin-bottom: 6px; cursor: pointer; }
.check-box { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; margin-top: 2px; accent-color: #3b82f6; }
label { display: flex; flex-wrap: wrap; gap: 4px 8px; cursor: pointer; flex: 1; }
.check-num { background: #dbeafe; color: #1d4ed8; font-size: .75rem; font-weight: bold; border-radius: 3px; padding: 0 5px; white-space: nowrap; }
.check-cat { font-size: .8rem; color: #6b7280; white-space: nowrap; }
.check-text { font-size: .88rem; color: #1f2937; }
input:checked + label .check-text { text-decoration: line-through; color: #9ca3af; }
.footer { text-align: center; font-size: .75rem; color: #9ca3af; margin-top: 20px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
.print-btn { display: block; width: 100%; padding: 10px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: .9rem; cursor: pointer; margin-top: 16px; }
@media print { body { background: #fff; padding: 0; } .header { background: #1d4ed8 !important; -webkit-print-color-adjust: exact; } .print-btn { display: none; } .check-item { break-inside: avoid; } }</style></head>
<body>
<div class="header"><h1>📋 Groovement Agent</h1><div class="meta">コンサル転職エージェント選びチェックリスト｜2026年06月27日 作成</div></div>
<div class="section-title">確認事項（全16項目）</div>
<div class="check-item"><input type="checkbox" id="chk1" class="check-box"><label for="chk1"><span class="check-num">01</span><span class="check-cat">エージェント専門分野確認</span><span class="check-text">コンサル・DX領域に特化したエージェントかどうかを確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk2" class="check-box"><label for="chk2"><span class="check-num">02</span><span class="check-cat">非公開求人数確認</span><span class="check-text">コンサル・DX系の非公開求人を保有しているかを確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk3" class="check-box"><label for="chk3"><span class="check-num">03</span><span class="check-cat">対応エリア確認</span><span class="check-text">自分の希望するエリアでの求人対応可否を確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk4" class="check-box"><label for="chk4"><span class="check-num">04</span><span class="check-cat">料金確認</span><span class="check-text">転職者側の費用負担がないことを確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk5" class="check-box"><label for="chk5"><span class="check-num">05</span><span class="check-cat">キャリアカウンセリング</span><span class="check-text">面談・キャリアカウンセリングの質と回数を確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk6" class="check-box"><label for="chk6"><span class="check-num">06</span><span class="check-cat">書類添削サポート</span><span class="check-text">履歴書・職務経歴書の添削サポートがあるかを確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk7" class="check-box"><label for="chk7"><span class="check-num">07</span><span class="check-cat">面接対策支援</span><span class="check-text">模擬面接・面接対策プログラムがあるかを確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk8" class="check-box"><label for="chk8"><span class="check-num">08</span><span class="check-cat">業界知識の深さ</span><span class="check-text">担当キャリアアドバイザーがコンサル業界に精通しているかを確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk9" class="check-box"><label for="chk9"><span class="check-num">09</span><span class="check-cat">希望条件のヒアリング</span><span class="check-text">年収・働き方・職種などの希望条件を丁寧に聞いてもらえるかを確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk10" class="check-box"><label for="chk10"><span class="check-num">10</span><span class="check-cat">企業との交渉代行</span><span class="check-text">年収交渉・入社条件調整を代行してもらえるかを確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk11" class="check-box"><label for="chk11"><span class="check-num">11</span><span class="check-cat">転職後フォロー</span><span class="check-text">入社後のアフターフォロー・相談対応があるかを確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk12" class="check-box"><label for="chk12"><span class="check-num">12</span><span class="check-cat">複数社並行登録</span><span class="check-text">複数の転職エージェントに同時登録して比較する方針を立てた</span></label></div>
<div class="check-item"><input type="checkbox" id="chk13" class="check-box"><label for="chk13"><span class="check-num">13</span><span class="check-cat">口コミ・評判確認</span><span class="check-text">Google口コミや第三者サイトでの評判を確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk14" class="check-box"><label for="chk14"><span class="check-num">14</span><span class="check-cat">個人情報の取り扱い</span><span class="check-text">個人情報の管理・取り扱い方針を確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk15" class="check-box"><label for="chk15"><span class="check-num">15</span><span class="check-cat">担当者変更の可否</span><span class="check-text">担当キャリアアドバイザーが合わない場合の変更手続きを確認した</span></label></div>
<div class="check-item"><input type="checkbox" id="chk16" class="check-box"><label for="chk16"><span class="check-num">16</span><span class="check-cat">求人紹介のペース</span><span class="check-text">求人紹介の頻度・量が自分のペースに合うかを確認した</span></label></div>

<button class="print-btn" onclick="window.print()">🖨️ 印刷 / PDFで保存</button>
<div class="footer">このチェックリストはGroovement Agentの申込前確認用です。2026年06月27日 時点。</div>
</body></html>
